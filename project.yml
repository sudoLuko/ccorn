name: CCorn
options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"            # match the installed Xcode; bump if needed
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"         # ad-hoc ("Sign to Run Locally"); no team required
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO     # not needed locally; notarization is out of scope
targets:
  CCorn:
    type: application
    platform: macOS
    sources:
      - path: Sources
    # No CODE_SIGN_ENTITLEMENTS and no App Sandbox capability on purpose.
    # App Sandbox OFF is required so the app can spawn tmux/claude/ps/lsof,
    # watch arbitrary directories with FSEvents, and send AppleEvents to Terminal.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.ccorn.app   # CHANGE to your preferred stable id
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: CCorn
        # Versions flow from the build settings (xcodegen regenerates this
        # plist, so hand-edits there do not survive).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "13.0"
        # NSAppleEventsUsageDescription is the TCC string shown the first time the
        # app automates Terminal. Keep it even in the shell.
        NSAppleEventsUsageDescription: "CCorn opens your Claude Code sessions in Terminal."
        # Deliberately NO LSUIElement. The app starts as .accessory at runtime
        # (see the build spec's activation-policy decision), which keeps the dynamic
        # .accessory <-> .regular switch working. A brief Dock-icon flash at launch
        # is expected and acceptable.

  # Pure-logic unit tests (Swift Testing). A hostless logic-test bundle: it does
  # NOT host the app, so running it never sets up a status item or needs a window
  # server. The engine's pure-logic sources are compiled directly into the test
  # bundle; captured-frame and transcript fixtures are read at runtime via
  # #filePath, so they need no resource plumbing.
  CCornEngineTests:
    type: bundle.unit-test
    platform: macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.ccorn.app.enginetests
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: Tests/CCornEngineTests
        excludes:
          - "Fixtures/**"   # read at runtime via #filePath, never compiled/bundled
      - path: Sources/Engine/StateDetector.swift
      - path: Sources/Engine/SessionDiscovery.swift
      - path: Sources/Engine/ProcessControl.swift
      - path: Sources/Engine/TmuxController.swift
      - path: Sources/Engine/CommandRunner.swift
      - path: Sources/Engine/TranscriptMetaCache.swift
      - path: Sources/Engine/ClaudeSessionRegistry.swift
      - path: Sources/Engine/SessionEngine.swift
      - path: Sources/Engine/SessionStore.swift
      - path: Sources/Engine/UnmanagedClaudeFinder.swift
      - path: Sources/Models/SessionState.swift
      # Theme rides along for the status-token tests (the palette and its
      # presentation routing); it needs only SessionState from above.
      - path: Sources/UI/Theme.swift
      - path: Sources/Models/SessionRecord.swift
      - path: Sources/Models/Discovery.swift
      - path: Sources/Models/CCornSettings.swift
      # Tests build the engine sources in Debug, where store/session lifecycle
      # instrumentation references DebugLife (#if DEBUG).
      - path: Sources/Debug/DebugLifecycle.swift
schemes:
  CCorn:
    build:
      targets:
        CCorn: all
        CCornEngineTests: [test]
    test:
      targets:
        - CCornEngineTests
    run:
      config: Debug
